appId: com.auralmusic.app
productName: AuralMusic

directories:
  output: dist

# 👇 👇 👇 核心：只保留中文 + 英文（你可以自己增删）
electronLanguages:
  # - en
  # - zh-CN

files:
  - out/**
  - package.json

asar: true

win:
  icon: build/icons/icon.ico
  target: nsis
  signAndEditExecutable: true #避免 rcedit 报错

mac:
  icon: build/icon.icns
  target: dmg

linux:
  icon: build/icons/png
